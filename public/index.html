<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Publik - KIACEH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <nav class="navbar navbar-dark navbar-gradient shadow-sm py-3 sticky-top">
        <div class="container d-flex flex-wrap justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center text-decoration-none m-0" href="#">
                <img src="https://www.freepnglogos.com/uploads/logo-garuda-png/garuda-buku-pembangunan-desa-kementrian-desa-pdtt-2.png" alt="Logo Garuda" class="brand-logo">
                <div class="d-flex flex-column lh-1">
                    <span class="fs-4 fw-bold">KIACEH</span>
                    <span class="fs-6 fw-normal text-white-50">Komisi Informasi Aceh</span>
                </div>
            </a>
            <a href="login.html" target="_blank" class="btn btn-outline-light btn-sm">Login</a>
        </div>
    </nav>

    <main class="container mt-5 flex-grow-1 mb-5">
        <div class="text-center mb-4 px-3">
            <h2 class="fw-bold fs-3">Sistem Informasi Sengketa Komisi Informasi Aceh</h2>
            <div class="row justify-content-center mt-3">
                <div class="col-md-8 col-lg-6">
                    <div class="input-group shadow-sm">
                        <input type="text" id="searchInput" class="form-control" placeholder="Cari Pemohon / Termohon..." oninput="filterTable()">
                        <button class="btn btn-primary" onclick="filterTable()">Cari</button>
                        <button class="btn btn-secondary" onclick="clearSearch()">Hapus</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="publicDataContainer">
            <div class="text-center py-5" id="loadingStatus"><div class="spinner-border text-primary" role="status"></div><p class="mt-2">Memuat data...</p></div>
        </div>
    </main>

    <div class="modal fade" id="detailModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-info position-relative">
                    <h5 class="modal-title fw-bold fs-5 w-100 text-center text-dark" id="detailModalTitle">Detail Perkara</h5>
                    <button type="button" class="btn-close position-absolute end-0 me-3" onclick="closeDetailModal()"></button>
                </div>
                <div class="modal-body position-relative bg-light">
                    <div id="detailLoading" style="display: none;"><div class="spinner-border text-info" role="status"></div></div>
                    <div class="row" id="detailContent"></div>
                </div>
                <div class="modal-footer position-relative d-flex justify-content-center align-items-center bg-light py-2" style="min-height: 55px; border-top: 1px solid #dee2e6;">
                    <button type="button" class="btn btn-secondary btn-sm px-4 fw-bold shadow-sm" onclick="closeDetailModal()">Tutup</button>
                    <div class="position-absolute end-0 bottom-0 me-3 mb-2 text-muted fw-normal" style="font-size: 0.75rem;" id="modalLastUpdated">
                        Data terakhir diperbarui tanggal: -
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-freeze">&copy; 2026 Komisi Informasi Aceh (KIACEH).</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let sheetHeadersPerkara = [], perkaraData = [], detailHeaders = [], detailData = [];

        function normalizeData(arr) {
            if (!arr || !Array.isArray(arr) || arr.length === 0) return [];
            if (arr.length === 1 && Array.isArray(arr) && Array.isArray(arr)) return arr;
            if (Array.isArray(arr) && Array.isArray(arr)) return arr.map(r => Array.isArray(r) ? r : r);
            return arr;
        }

        async function loadPublicData() {
            const container = document.getElementById('publicDataContainer');
            try {
                const response = await fetch('/api/data'); const data = await response.json();
                
                let rawPerkara = normalizeData(data.perkara || []);
                let rawDetail = normalizeData(data.detail || []);

                if (rawPerkara.length <= 1) { container.innerHTML = '<div class="text-center"><p class="text-muted">Data kosong.</p></div>'; return; }

                // UPDATE: Membatasi hanya mengambil baris A1 sampai F1 (kolom 1 sampai 6)
                sheetHeadersPerkara = rawPerkara.slice(0, 6); 
                perkaraData = rawPerkara.slice(1); 
                detailHeaders = rawDetail || []; detailData = rawDetail.slice(1);
                
                const skipIdx = sheetHeadersPerkara.findIndex(h => String(h || '').toLowerCase().trim() === 'detail');
                let tableHtml = `<div class="table-responsive shadow-sm bg-white border"><table class="table table-sm table-bordered table-hover table-striped mb-0"><thead class="table-dark"><tr>`;
                
                sheetHeadersPerkara.forEach((h, i) => { if(i !== skipIdx) tableHtml += `<th>${h || '-'}</th>`; });
                tableHtml += `<th>Detail</th></tr></thead><tbody id="dataTable">`;

                perkaraData.forEach(row => {
                    tableHtml += `<tr>`;
                    // Loop disesuaikan dengan panjang susunan header A1-F1
                    for (let i = 0; i < sheetHeadersPerkara.length; i++) { if(i !== skipIdx) tableHtml += `<td>${row[i] || '-'}</td>`; }
                    tableHtml += `<td><button class="btn btn-warning btn-sm text-dark fw-bold shadow-sm py-0" onclick="lihatDetail('${row}')">Lihat</button></td></tr>`;
                });
                tableHtml += `</tbody></table></div>`;
                container.innerHTML = tableHtml;
            } catch (error) { container.innerHTML = `<div class="text-center text-danger">Error: ${error.message}</div>`; }
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#dataTable tr');
            const idxPem = sheetHeadersPerkara.findIndex(h => String(h || '').toLowerCase().includes('pemohon'));
            const idxTerm = sheetHeadersPerkara.findIndex(h => String(h || '').toLowerCase().includes('termohon'));
            const skipIdx = sheetHeadersPerkara.findIndex(h => String(h || '').toLowerCase().trim() === 'detail');
            
            rows.forEach(row => {
                const cells = row.getElementsByTagName('td');
                if(cells.length <= 1) return;
                const pemohon = cells[idxPem > skipIdx ? idxPem - 1 : idxPem] ? cells[idxPem > skipIdx ? idxPem - 1 : idxPem].textContent.toLowerCase() : '';
                const termohon = cells[idxTerm > skipIdx ? idxTerm - 1 : idxTerm] ? cells[idxTerm > skipIdx ? idxTerm - 1 : idxTerm].textContent.toLowerCase() : '';
                row.style.display = (pemohon.includes(query) || termohon.includes(query)) ? '' : 'none';
            });
        }
        function clearSearch() {
