<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Publik - KIACEH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .search-box-elegant { border-radius: 2rem; overflow: hidden; }
        .search-box-elegant input { border: none !important; box-shadow: none !important; }
        
        .table-elegant-wrapper {
            border-radius: 0.75rem;
            overflow: hidden; 
            border: 1px solid #dee2e6;
        }
        
        .table-responsive::-webkit-scrollbar { height: 8px; }
        .table-responsive::-webkit-scrollbar-track { background: #f8f9fa; }
        .table-responsive::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        .table-responsive::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }

        .animated-icon {
            width: 26px; height: 20px; position: relative; margin: 0px;
            transform: rotate(0deg); transition: .5s ease-in-out; cursor: pointer;
        }
        .animated-icon span {
            display: block; position: absolute; height: 3px; width: 100%;
            background: #fff; border-radius: 9px; opacity: 1; left: 0;
            transform: rotate(0deg); transition: .25s ease-in-out;
        }
        .animated-icon span:nth-child(1) { top: 0px; }
        .animated-icon span:nth-child(2) { top: 8px; }
        .animated-icon span:nth-child(3) { top: 16px; }
        .animated-icon.open span:nth-child(1) { top: 8px; transform: rotate(135deg); }
        .animated-icon.open span:nth-child(2) { opacity: 0; left: -60px; }
        .animated-icon.open span:nth-child(3) { top: 8px; transform: rotate(-135deg); }

        .custom-offcanvas { max-width: 320px; border-left: none; box-shadow: -5px 0 25px rgba(0,0,0,0.15); }
        .offcanvas-menu-link { transition: all 0.3s ease; border-radius: 0.5rem; padding: 12px 15px; }
        .offcanvas-menu-link:hover { background-color: #f0f7ff; transform: translateX(6px); }
        .social-icon-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 45px; height: 45px; border-radius: 50%; background: #f8f9fa; transition: all 0.3s ease;
        }
        .social-icon-btn:hover { transform: translateY(-4px); box-shadow: 0 6px 15px rgba(0,0,0,0.1); background: white; }

        /* --- Tipografi & Optimalisasi Mobile Modal --- */
        .info-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6c757d;
            font-weight: 700;
            margin-bottom: 0.3rem;
        }
        .info-value {
            font-size: 0.95rem;
            color: #1a1d20;
            font-weight: 600;
        }
        .fs-7 { font-size: 0.85rem !important; }
        .card-rincian {
            max-height: 480px; 
            overflow-y: auto;
        }

        /* Mematikan "Double Scroll" dan merapikan padding saat dibuka di HP */
        @media (max-width: 991.98px) {
            .card-rincian {
                max-height: none; 
                overflow-y: visible;
            }
            .modal-body { padding: 1rem !important; }
        }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    
    <nav class="navbar navbar-dark shadow-sm py-3 sticky-top" style="background: linear-gradient(135deg, #002b5e 0%, #0099ff 100%);">
        <div class="container d-flex flex-wrap justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center text-decoration-none m-0" href="#">
                <img src="https://www.freepnglogos.com/uploads/logo-garuda-png/garuda-buku-pembangunan-desa-kementrian-desa-pdtt-2.png" alt="Logo Garuda" class="brand-logo" style="width: 40px; height: auto; margin-right: 10px;">
                <div class="d-flex flex-column lh-1">
                    <span class="fs-5 fs-md-4 fw-bold text-white">KIACEH</span>
                    <span class="fw-normal text-white-50" style="font-size: 0.75rem;">Komisi Informasi Aceh</span>
                </div>
            </a>
            
            <div class="d-flex align-items-center gap-2 gap-md-3">
                <a href="login.html" target="_blank" class="btn btn-outline-light btn-sm fw-bold px-2 px-md-3">Login</a>
                <button class="navbar-toggler border-0 p-2 shadow-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuOffcanvas" aria-controls="menuOffcanvas">
                    <div class="animated-icon" id="navIcon">
                        <span></span><span></span><span></span>
                    </div>
                </button>
            </div>
        </div>
    </nav>

    <div class="offcanvas offcanvas-end custom-offcanvas" tabindex="-1" id="menuOffcanvas" aria-labelledby="menuOffcanvasLabel">
        <div class="offcanvas-header shadow-sm" style="background: linear-gradient(135deg, #002b5e 0%, #0099ff 100%);">
            <h5 class="offcanvas-title fw-bold text-white" id="menuOffcanvasLabel">Menu Navigasi</h5>
            <button type="button" class="btn-close btn-close-white shadow-none" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column p-4 bg-white">
            <ul class="navbar-nav flex-grow-1 pe-3 mt-2">
                <li class="nav-item mb-2">
                    <a class="nav-link text-dark fw-bold fs-6 d-flex align-items-center offcanvas-menu-link" href="index.html">
                        <i class="bi bi-house-door-fill me-3 fs-4" style="color: #0099ff;"></i> Beranda
                    </a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-dark fw-bold fs-6 d-flex align-items-center offcanvas-menu-link" href="https://kia.acehprov.go.id" target="_blank">
                        <i class="bi bi-globe me-3 fs-4 text-info"></i> Ke Website Utama
                    </a>
                </li>
            </ul>
            
            <div class="mt-auto pt-4 border-top">
                <p class="text-muted fw-bold mb-3" style="font-size: 0.9rem;">Ikuti Sosial Media Kami:</p>
                <div class="d-flex gap-3">
                    <a href="https://instagram.com" target="_blank" class="text-decoration-none social-icon-btn" style="color: #E1306C;" title="Instagram"><i class="bi bi-instagram fs-4"></i></a>
                    <a href="https://facebook.com" target="_blank" class="text-decoration-none social-icon-btn" style="color: #1877F2;" title="Facebook"><i class="bi bi-facebook fs-4"></i></a>
                    <a href="https://youtube.com" target="_blank" class="text-decoration-none social-icon-btn" style="color: #FF0000;" title="YouTube"><i class="bi bi-youtube fs-4"></i></a>
                </div>
            </div>
        </div>
    </div>

    <main class="container mt-4 mt-md-5 flex-grow-1 mb-5 pb-4">
        <div class="text-center mb-4 px-2">
            <h2 class="fw-bold fs-4 fs-md-3">Sistem Informasi Sengketa Komisi Informasi Aceh</h2>
            
            <div class="row justify-content-center mt-4">
                <div class="col-12 col-md-8 col-lg-6">
                    <div class="input-group search-box-elegant shadow bg-white p-1">
                        <input type="text" id="searchInput" class="form-control px-3" placeholder="Cari Pemohon / Termohon..." oninput="filterTable()">
                        <button class="btn btn-primary rounded-pill px-3 px-md-4 fw-bold me-1" onclick="filterTable()"><i class="bi bi-search"></i></button>
                        <button class="btn btn-light border rounded-pill px-3 fw-bold text-secondary" onclick="clearSearch()">Hapus</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="publicDataContainer" class="px-2 px-md-0">
            <div class="text-center py-5" id="loadingStatus">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted fw-bold">Memuat data...</p>
            </div>
        </div>
    </main>

    <button id="btnScrollTop" class="btn shadow-lg rounded-circle position-fixed" 
            style="bottom: 80px; right: 20px; width: 50px; height: 50px; z-index: 1040; border: 2px solid white; background: linear-gradient(135deg, #0099ff 0%, #002b5e 100%); display: none; align-items: center; justify-content: center; padding: 0;" 
            onclick="scrollToTop()" title="Kembali ke Atas">
        <i class="bi bi-chevron-up fs-4 text-white"></i>
    </button>

    <div class="modal fade" id="detailModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-info position-relative flex-column align-items-center pt-4 pb-3 border-bottom-0 shadow-sm z-1">
                    <button type="button" class="btn-close position-absolute end-0 top-0 mt-3 me-3 shadow-none" onclick="closeDetailModal()"></button>
                    <h5 class="modal-title fw-bold fs-5 text-center text-dark w-100" id="detailModalTitle">Detail Perkara</h5>
                    <div id="detailModalSubtitle" class="w-100"></div>
                </div>
                <div class="modal-body position-relative bg-light px-4 py-4">
                    <div id="detailLoading" style="display: none;" class="text-center py-5"><div class="spinner-border text-info" role="status"></div></div>
                    <div id="detailContent"></div>
                </div>
                <div class="modal-footer position-relative d-flex justify-content-center align-items-center bg-white py-3 border-top shadow-sm" style="min-height: 65px;">
                    <button type="button" class="btn btn-secondary px-5 rounded-pill fw-bold shadow-sm" onclick="closeDetailModal()">Tutup</button>
                    <div class="position-absolute end-0 bottom-0 me-3 mb-2 text-muted fw-bold" style="font-size: 0.65rem; letter-spacing: 0.5px;" id="modalLastUpdated">
                        DIPERBARUI: -
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-freeze">&copy; 2026 Komisi Informasi Aceh (KIACEH).</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let sheetHeadersPerkara = [], perkaraData = [], detailHeaders = [], detailData = [], updateData = [];

        async function loadPublicData() {
            const container = document.getElementById('publicDataContainer');
            if (!container) return;
            try {
                container.innerHTML = '<div class="text-center py-5" id="loadingStatus"><div class="spinner-border text-primary" role="status"></div><p class="mt-2 text-muted fw-bold">Memuat data...</p></div>';
                const response = await fetch('/api/data');
                if (!response.ok) throw new Error(`Gagal terhubung ke server (HTTP Status: ${response.status})`);
                const textData = await response.text();
                let data;
                try { data = JSON.parse(textData); } catch (e) { throw new Error("Format respons dari server tidak valid."); }
                
                if (!data || !data.perkara || data.perkara.length <= 1) { 
                    container.innerHTML = '<div class="text-center py-5 bg-white rounded-3 shadow-sm"><p class="text-muted fw-bold mb-0">Belum ada data sengketa yang tersedia.</p></div>'; return; 
                }

                sheetHeadersPerkara = data.perkara[0] || []; perkaraData = data.perkara.slice(1) || []; 
                detailHeaders = (data.detail && data.detail[0]) ? data.detail[0] : []; detailData = (data.detail && data.detail.length > 1) ? data.detail.slice(1) : [];
                updateData = (data.update && data.update.length > 1) ? data.update.slice(1) : [];
                
                const skipIdx = sheetHeadersPerkara.findIndex(h => (`${h}`).toLowerCase().trim() === 'detail');
                let tableHtml = `<div class="bg-white shadow-sm table-elegant-wrapper"><div class="table-responsive"><table class="table table-sm table-hover table-striped mb-0 align-middle"><thead class="table-dark text-nowrap"><tr>`;
                sheetHeadersPerkara.forEach((h, i) => { if(i !== skipIdx) tableHtml += `<th class="py-3 px-3">${h || '-'}</th>`; });
                tableHtml += `<th class="py-3 px-3 text-center">Detail</th></tr></thead><tbody id="dataTable">`;

                perkaraData.forEach(row => {
                    if (!row || row.length === 0) return; 
                    tableHtml += `<tr>`;
                    for (let i = 0; i < sheetHeadersPerkara.length; i++) { if(i !== skipIdx) tableHtml += `<td class="px-3 py-2 text-nowrap">${row[i] || '-'}</td>`; }
                    tableHtml += `<td class="px-3 py-2 text-center"><button class="btn btn-warning btn-sm text-dark fw-bold shadow-sm py-1 px-3 rounded-pill" onclick="lihatDetail('${row[0] || ''}')">Lihat</button></td></tr>`;
                });
                
                tableHtml += `</tbody></table></div></div>`; container.innerHTML = tableHtml;
            } catch (error) { 
                container.innerHTML = `<div class="text-center py-5 my-4 border border-danger rounded-3 bg-white shadow-sm"><h5 class="text-danger fw-bold"><i class="bi bi-exclamation-triangle-fill"></i> Gagal Memuat Data</h5><p class="text-muted mb-3">${error.message}</p><button class="btn btn-outline-danger btn-sm px-4 fw-bold rounded-pill" onclick="loadPublicData()">Coba Muat Ulang</button></div>`; 
            }
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#dataTable tr');
            const idxPem = sheetHeadersPerkara.findIndex(h => (`${h}`).toLowerCase().includes('pemohon'));
            const idxTerm = sheetHeadersPerkara.findIndex(h => (`${h}`).toLowerCase().includes('termohon'));
            const skipIdx = sheetHeadersPerkara.findIndex(h => (`${h}`).toLowerCase().trim() === 'detail');
            
            rows.forEach(row => {
                const cells = row.getElementsByTagName('td');
                if(cells.length <= 1) return;
                const pemohon = cells[idxPem > skipIdx ? idxPem - 1 : idxPem] ? cells[idxPem > skipIdx ? idxPem - 1 : idxPem].textContent.toLowerCase() : '';
                const termohon = cells[idxTerm > skipIdx ? idxTerm - 1 : idxTerm] ? cells[idxTerm > skipIdx ? idxTerm - 1 : idxTerm].textContent.toLowerCase() : '';
                row.style.display = (pemohon.includes(query) || termohon.includes(query)) ? '' : 'none';
            });
        }
        function clearSearch() { document.getElementById('searchInput').value = ''; filterTable(); }

        function lihatDetail(id) {
            new bootstrap.Modal(document.getElementById('detailModal')).show();
            document.getElementById('detailLoading').style.display = 'block'; document.getElementById('detailContent').innerHTML = '';
            document.getElementById('detailModalSubtitle').innerHTML = '';

            const pRow = perkaraData.find(r => r[0] === id);
            const getIndexPem = sheetHeadersPerkara.findIndex(h=>(`${h}`).toLowerCase().includes('pemohon'));
            const getIndexTerm = sheetHeadersPerkara.findIndex(h=>(`${h}`).toLowerCase().includes('termohon'));
            
            setTimeout(() => {
                const row = detailData.find(r => r[0] === id);
                
                const getField = (f) => {
                    let fieldVal = '-', labelText = f;
                    const findIdx = (headers) => headers.findIndex(h => { 
                        const val = (`${h}`).toLowerCase().trim(); 
                        return val === f || 
                               (f === 'sidang terakhir' && val === 'sidang') || 
                               (f === 'no reg' && val === 'rincian informasi') || 
                               (f === 'isi permohonan' && val === 'rincian permohonan') ||
                               (f === 'tgl register' && val === 'tanggal register'); 
                    });

                    let idx = findIdx(detailHeaders);
                    if(idx !== -1) { fieldVal = row ? (row[idx] || '-') : '-'; labelText = detailHeaders[idx]; } 
                    else { idx = findIdx(sheetHeadersPerkara); if(idx !== -1) { fieldVal = pRow ? (pRow[idx] || '-') : '-'; labelText = sheetHeadersPerkara[idx]; } }

                    if(idx !== -1) {
                        if(f === 'no reg') labelText = 'No Register'; 
                        if(f === 'tgl register') labelText = 'Tgl Register';
                        
                        if(f.includes('tgl') || f.includes('tanggal') || f.includes('sidang')) {
                            if (/^\d{4}-\d{2}-\d{2}$/.test(fieldVal)) { const p = fieldVal.split('-'); fieldVal = `${p[2]}/${p[1]}/${p[0]}`; }
                        }
                        if (f === 'link putusan' && fieldVal !== '-' && fieldVal !== '') fieldVal = `<a href="${!fieldVal.startsWith('http')?'https://'+fieldVal:fieldVal}" target="_blank" class="text-primary fw-bold text-decoration-none">Buka Putusan <i class="bi bi-box-arrow-up-right"></i></a>`;
                        return { label: labelText, val: fieldVal };
                    }
                    return null;
                };

                const dataNoReg = getField('no reg');
                const dataTglReg = getField('tgl register');
                
                // UPDATE: Menyesuaikan warna teks Pemohon & Termohon agar menyatu indah dengan bg-info
                const titleText = pRow ? `<span class="text-dark">${pRow[getIndexPem] || 'Pemohon'}</span> <span class="text-danger mx-1">vs</span> <span class="text-dark">${pRow[getIndexTerm] || 'Termohon'}</span>` : 'Detail Perkara';
                document.getElementById('detailModalTitle').innerHTML = titleText;
                
                document.getElementById('detailModalSubtitle').innerHTML = `
                    <div class="d-flex flex-wrap justify-content-center gap-2 mt-3">
                        <span class="badge bg-white text-dark border shadow-sm fs-7 fw-bold px-2 py-2"><i class="bi bi-hash text-muted"></i>Nomor Reg.: ${dataNoReg ? dataNoReg.val : '-'}</span>
                        <span class="badge bg-white text-dark border shadow-sm fs-7 fw-bold px-2 py-2"><i class="bi bi-calendar3 text-muted"></i>Tgl Reg.: ${dataTglReg ? dataTglReg.val : '-'}</span>
                    </div>`;

                const col1Fields = ["status sengketa", "sidang terakhir", "tgl sidang selanjutnya", "agenda sidang selanjutnya", "nomor putusan", "tgl diputuskan", "link putusan"];
                const col2Fields = ["ketua majelis", "anggota 1", "anggota 2", "mediator", "panitera pengganti"];
                const col3Fields = ["isu sengketa", "isi permohonan"];

                let htmlContent = '<div class="row align-items-stretch">';

                let htmlCol1 = `<div class="col-lg-4 mb-4 mb-lg-0"><div class="card shadow-sm border-0 rounded-4 h-100"><div class="card-header bg-white border-bottom fw-bold text-center py-3" style="color: #002b5e; font-size: 1rem;"><i class="bi bi-calendar-check me-2"></i>Agenda & Jadwal</div><div class="card-body d-flex flex-column justify-content-center text-center py-4 px-3">`;
                col1Fields.forEach(f => {
                    const data = getField(f);
                    if(data) {
                        let displayVal = data.val;
                        if (f === 'status sengketa') {
                            const statusStr = displayVal.toLowerCase();
                            if (statusStr.includes('selesai')) {
                                displayVal = `<span class="badge bg-success shadow-sm px-3 py-2 mt-1 fs-7 rounded-pill">${displayVal}</span>`;
                            } else if (statusStr.includes('dalam proses')) {
                                displayVal = `<span class="badge bg-warning text-dark shadow-sm px-3 py-2 mt-1 fs-7 rounded-pill">${displayVal}</span>`;
                            } else if (displayVal !== '-') {
                                displayVal = `<span class="badge bg-secondary shadow-sm px-3 py-2 mt-1 fs-7 rounded-pill">${displayVal}</span>`;
                            }
                        }
                        htmlCol1 += `<div class="mb-3"><div class="info-label">${data.label}</div><div class="info-value">${displayVal}</div></div>`;
                    }
                });
                htmlCol1 += `</div></div></div>`;

                let htmlCol2 = `<div class="col-lg-4 mb-4 mb-lg-0"><div class="card shadow-sm border-0 rounded-4 h-100"><div class="card-header bg-white border-bottom fw-bold text-center py-3" style="color: #002b5e; font-size: 1rem;"><i class="bi bi-people me-2"></i>Perangkat Persidangan</div><div class="card-body d-flex flex-column justify-content text-center py-4 px-3">`;
                col2Fields.forEach(f => {
                    const data = getField(f);
                    if(data) htmlCol2 += `<div class="mb-3"><div class="info-label">${data.label}</div><div class="info-value">${data.val}</div></div>`;
                });
                htmlCol2 += `</div></div></div>`;

                let htmlCol3 = `<div class="col-lg-4 mb-0"><div class="card shadow-sm border-0 rounded-4 h-100"><div class="card-header bg-white border-bottom fw-bold text-center py-3" style="color: #002b5e; font-size: 1rem;"><i class="bi bi-file-earmark-text me-2"></i>Rincian Sengketa</div><div class="card-body card-rincian py-4 px-4">`;
                let foundCol3 = false;
                col3Fields.forEach(f => {
                    const data = getField(f);
                    if(data && data.val !== '-') {
                        foundCol3 = true;
                        htmlCol3 += `<div class="mb-4"><div class="info-label text-start" style="border-bottom: 1px dashed #dee2e6; padding-bottom: 6px; margin-bottom: 8px;">${data.label}</div><div class="info-value text-start fw-normal lh-base">${data.val}</div></div>`;
                    }
                });
                if(!foundCol3) htmlCol3 += `<div class="text-center text-muted mt-4"><i class="bi bi-inbox fs-1 d-block mb-2 text-light"></i><span style="font-size: 0.9rem;">Belum ada rincian data</span></div>`;
                htmlCol3 += `</div></div></div>`;

                htmlContent += htmlCol1 + htmlCol2 + htmlCol3 + '</div>';

                const pRowIndex = perkaraData.findIndex(r => r[0] === id);
                let latestUpdatedDate = '-';
                if (pRowIndex !== -1 && updateData[pRowIndex] && updateData[pRowIndex][0]) latestUpdatedDate = updateData[pRowIndex][0];
                if (document.getElementById('modalLastUpdated')) document.getElementById('modalLastUpdated').innerText = "DIPERBARUI: " + latestUpdatedDate.toUpperCase();
                
                document.getElementById('detailContent').innerHTML = htmlContent; 
                document.getElementById('detailLoading').style.display = 'none';
            }, 500); 
        }

        function closeDetailModal() { bootstrap.Modal.getInstance(document.getElementById('detailModal')).hide(); }
        document.addEventListener('DOMContentLoaded', loadPublicData);

        const btnScrollTop = document.getElementById('btnScrollTop');
        window.addEventListener('scroll', () => {
            if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) btnScrollTop.style.display = "flex";
            else btnScrollTop.style.display = "none";
        });
        function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }

        const myOffcanvas = document.getElementById('menuOffcanvas');
        const navIcon = document.getElementById('navIcon');
        myOffcanvas.addEventListener('show.bs.offcanvas', () => navIcon.classList.add('open'));
        myOffcanvas.addEventListener('hide.bs.offcanvas', () => navIcon.classList.remove('open'));
    </script>
</body>
</html>
