<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Publik - KIACEH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <nav class="navbar navbar-dark bg-primary shadow-sm py-3 sticky-top">
        <div class="container d-flex flex-wrap justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center text-decoration-none m-0" href="#">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/National_emblem_of_Indonesia_Garuda_Pancasila.svg/600px-National_emblem_of_Indonesia_Garuda_Pancasila.svg.png" alt="Logo Garuda" class="brand-logo">
                <div class="d-flex flex-column lh-1">
                    <span class="fs-4 fw-bold">KIACEH</span>
                    <span class="fs-6 fw-normal text-white-50">Komisi Informasi Aceh</span>
                </div>
            </a>
            <a href="login.html" class="btn btn-outline-light btn-sm">Login Admin</a>
        </div>
    </nav>

    <main class="container mt-5 flex-grow-1 mb-5">
        <div class="text-center mb-4 px-3">
            <h2 class="fw-bold fs-3">Informasi Data Perkara Publik</h2>
            <p class="text-muted fs-6">Data diperbarui secara real-time dari sistem administrasi.</p>
        </div>
        <div id="publicDataContainer"></div>
    </main>

    <!-- Modal Pop Up Detail Perkara -->
    <div class="modal fade" id="detailModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-info text-white d-flex justify-content-start align-items-center">
                    <button type="button" class="btn-close btn-close-white me-3 m-0" onclick="closeDetailModal()"></button>
                    <h5 class="modal-title fw-bold m-0 fs-5">Detail Perkara</h5>
                </div>
                <div class="modal-body position-relative bg-light">
                    <div id="detailLoading" style="display: none;">
                        <div class="spinner-border text-info" role="status"></div>
                    </div>
                    <div class="row" id="detailContent"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container"><small>&copy; 2026 Komisi Informasi Aceh (KIACEH). Semua hak dilindungi.</small></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let detailHeaders = [];
        let detailData = [];

        async function loadPublicData() {
            const container = document.getElementById('publicDataContainer');
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                
                if (!data.perkara || data.perkara.length <= 1) {
                    container.innerHTML = '<div class="text-center"><p class="text-muted">Belum ada data perkara.</p></div>';
                    return;
                }

                const headersPerkara = data.perkara[0]; 
                const rowsPerkara = data.perkara.slice(1); 
                detailHeaders = data.detail[0] || [];
                detailData = data.detail.slice(1) || [];
                
                /* Penambahan table-bordered */
                let tableHtml = `
                    <div class="table-responsive shadow-sm bg-white border">
                        <table class="table table-sm table-bordered table-hover table-striped mb-0">
                            <thead class="table-dark"><tr>
                `;

                headersPerkara.forEach(h => { tableHtml += `<th>${h}</th>`; });
                tableHtml += `<th>Detail</th></tr></thead><tbody>`;

                rowsPerkara.forEach(row => {
                    tableHtml += `<tr>`;
                    for (let i = 0; i < headersPerkara.length; i++) {
                        tableHtml += `<td>${row[i] || '-'}</td>`;
                    }
                    const rowId = row[0] || '';
                    tableHtml += `<td><button class="btn btn-info btn-sm text-white fw-bold shadow-sm py-0" onclick="lihatDetail('${rowId}')">Lihat</button></td></tr>`;
                });

                tableHtml += `</tbody></table></div>`;
                container.innerHTML = tableHtml;

            } catch (error) { container.innerHTML = `<div class="text-center text-danger fw-bold">Kesalahan: ${error.message}</div>`; }
        }

        function lihatDetail(id) {
            const modalEl = document.getElementById('detailModal');
            const modal = new bootstrap.Modal(modalEl);
            modal.show();
            
            document.getElementById('detailLoading').style.display = 'flex';
            document.getElementById('detailContent').innerHTML = '';

            setTimeout(() => {
                const row = detailData.find(r => r[0] === id);
                let html = '';
                
                if(row) {
                    detailHeaders.forEach((header, i) => {
                        // Perubahan ke div agar tag HTML dari Quill bisa ter-render sempurna
                        html += `
                        <div class="col-md-6 mb-3">
                            <div class="card shadow-sm border-0 h-100">
                                <div class="card-body py-2">
                                    <small class="text-muted fw-bold d-block mb-1">${header}</small>
                                    <div class="text-dark" style="font-size: 0.9rem;">${row[i] || '-'}</div>
                                </div>
                            </div>
                        </div>`;
                    });
                } else {
                    html = '<div class="col-12 text-center text-muted py-5">Data detail belum diinput oleh Admin.</div>';
                }
                
                document.getElementById('detailContent').innerHTML = html;
                document.getElementById('detailLoading').style.display = 'none';
            }, 500); 
        }

        function closeDetailModal() {
            document.getElementById('detailLoading').style.display = 'flex';
            setTimeout(() => {
                const modal = bootstrap.Modal.getInstance(document.getElementById('detailModal'));
                if(modal) modal.hide();
                document.getElementById('detailLoading').style.display = 'none';
            }, 300); 
        }

        window.onload = loadPublicData;
    </script>
</body>
</html>
