<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Publik - KIACEH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <!-- Navbar Responsif dengan Logo -->
    <nav class="navbar navbar-dark bg-primary shadow-sm py-3">
        <div class="container d-flex flex-wrap justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center text-decoration-none m-0" href="#">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/National_emblem_of_Indonesia_Garuda_Pancasila.svg/600px-National_emblem_of_Indonesia_Garuda_Pancasila.svg.png" alt="Logo Garuda" class="brand-logo">
                <div class="d-flex flex-column lh-1">
                    <span class="fs-4 fw-bold">KIACEH</span>
                    <span class="fs-6 fw-normal text-white-50">Komisi Informasi Aceh</span>
                </div>
            </a>
            <a href="login.html" class="btn btn-outline-light btn-sm">Login Admin</a>
        </div>
    </nav>

    <!-- Konten Utama -->
    <div class="container mt-5">
        <div class="text-center mb-5 px-3">
            <h2 class="fw-bold">Informasi Data Perkara Publik</h2>
            <p class="text-muted">Data di bawah ini diperbarui secara real-time dari sistem administrasi.</p>
        </div>

        <div class="row" id="publicDataContainer">
            <div class="col-12 text-center py-5" id="loadingStatus">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Memuat data dari server...</p>
            </div>
        </div>
    </div>

    <script>
        async function loadPublicData() {
            const container = document.getElementById('publicDataContainer');
            
            try {
                const response = await fetch('/api/data');
                const data = await response.json();

                if (!response.ok || data.error) throw new Error(data.error || 'Gagal memuat API');
                
                if (!data || data.length <= 1) {
                    container.innerHTML = '<div class="col-12 text-center"><p class="text-muted">Belum ada data perkara yang dipublikasikan.</p></div>';
                    return;
                }

                const headers = data[0]; 
                const rows = data.slice(1); 
                
                container.innerHTML = ''; 

                rows.forEach(row => {
                    let cardHtml = `
                        <div class="col-lg-4 col-md-6 col-12 mb-4">
                            <div class="card h-100 shadow-sm border-0">
                                <div class="card-header bg-primary text-white fw-bold">
                                    ${headers[0]}: ${row[0] || '-'}
                                </div>
                                <div class="card-body">
                                    <ul class="list-group list-group-flush">
                    `;

                    for (let i = 1; i < headers.length; i++) {
                        cardHtml += `
                            <li class="list-group-item px-0">
                                <small class="text-muted d-block">${headers[i]}</small>
                                <span class="fw-medium">${row[i] || '-'}</span>
                            </li>
                        `;
                    }

                    cardHtml += `
                                    </ul>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += cardHtml;
                });

            } catch (error) {
                container.innerHTML = `<div class="col-12 text-center text-danger fw-bold">Kesalahan: ${error.message}</div>`;
            }
        }

        window.onload = loadPublicData;
    </script>
</body>
</html>
