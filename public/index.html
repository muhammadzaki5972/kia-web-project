<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Publik - Sistem KIA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Komisi Informasi - Data Perkara</a>
            <a href="login.html" class="btn btn-outline-light btn-sm">Login Admin</a>
        </div>
    </nav>

    <!-- Konten Utama -->
    <div class="container mt-5">
        <div class="text-center mb-5">
            <h2 class="fw-bold">Informasi Data Perkara Publik</h2>
            <p class="text-muted">Data di bawah ini diperbarui secara real-time dari sistem administrasi.</p>
        </div>

        <!-- Container untuk Kartu Data -->
        <div class="row" id="publicDataContainer">
            <div class="col-12 text-center py-5" id="loadingStatus">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Memuat data dari server...</p>
            </div>
        </div>
    </div>

    <!-- Script Khusus Halaman Publik -->
    <script>
        async function loadPublicData() {
            const container = document.getElementById('publicDataContainer');
            
            try {
                const response = await fetch('/api/data');
                const data = await response.json();

                if (!response.ok || data.error) throw new Error(data.error || 'Gagal memuat API');
                
                if (!data || data.length <= 1) {
                    container.innerHTML = '<div class="col-12 text-center"><p class="text-muted">Belum ada data perkara yang dipublikasikan.</p></div>';
                    return;
                }

                const headers = data[0]; // Baris A1:F1
                const rows = data.slice(1); // Baris A2 ke bawah
                
                container.innerHTML = ''; // Bersihkan loading

                // Render setiap baris data menjadi kartu (Card) Bootstrap
                rows.forEach(row => {
                    let cardHtml = `
                        <div class="col-lg-4 col-md-6 mb-4">
                            <div class="card h-100 shadow-sm border-0">
                                <div class="card-header bg-primary text-white fw-bold">
                                    ${headers[0]}: ${row[0] || '-'}
                                </div>
                                <div class="card-body">
                                    <ul class="list-group list-group-flush">
                    `;

                    // Looping sisa kolom (mulai dari kolom ke-2 sampai ke-6)
                    for (let i = 1; i < headers.length; i++) {
                        cardHtml += `
                            <li class="list-group-item px-0">
                                <small class="text-muted d-block">${headers[i]}</small>
                                <span class="fw-medium">${row[i] || '-'}</span>
                            </li>
                        `;
                    }

                    cardHtml += `
                                    </ul>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += cardHtml;
                });

            } catch (error) {
                container.innerHTML = `<div class="col-12 text-center text-danger fw-bold">Kesalahan: ${error.message}</div>`;
            }
        }

        window.onload = loadPublicData;
    </script>
</body>
</html>
