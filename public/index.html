<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Publik - KIACEH</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .search-box-elegant { border-radius: 2rem; overflow: hidden; }
        .search-box-elegant input { border: none !important; box-shadow: none !important; }
        
        /* Pembungkus luar untuk membuat sudut tabel melengkung */
        .table-elegant-wrapper {
            border-radius: 0.75rem;
            overflow: hidden; 
            border: 1px solid #dee2e6;
        }
        
        /* Custom scrollbar elegan untuk tabel */
        .table-responsive::-webkit-scrollbar { height: 8px; }
        .table-responsive::-webkit-scrollbar-track { background: #f8f9fa; }
        .table-responsive::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        .table-responsive::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    
    <!-- Header -->
    <nav class="navbar navbar-dark shadow-sm py-3 sticky-top" style="background: linear-gradient(135deg, #002b5e 0%, #0099ff 100%);">
        <div class="container d-flex flex-wrap justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center text-decoration-none m-0" href="#">
                <img src="https://www.freepnglogos.com/uploads/logo-garuda-png/garuda-buku-pembangunan-desa-kementrian-desa-pdtt-2.png" alt="Logo Garuda" class="brand-logo" style="width: 40px; height: auto; margin-right: 10px;">
                <div class="d-flex flex-column lh-1">
                    <span class="fs-5 fs-md-4 fw-bold text-white">KIACEH</span>
                    <span class="fw-normal text-white-50" style="font-size: 0.75rem;">Komisi Informasi Aceh</span>
                </div>
            </a>
            
            <div class="d-flex align-items-center gap-2 gap-md-3">
                <a href="login.html" target="_blank" class="btn btn-outline-light btn-sm fw-bold px-2 px-md-3">Login</a>
                <button class="navbar-toggler border-0 p-1 shadow-none" type="button" data-bs-toggle="offcanvas" data-bs-target="#menuOffcanvas" aria-controls="menuOffcanvas">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>
        </div>
    </nav>

    <!-- Panel Menu Hamburger -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="menuOffcanvas" aria-labelledby="menuOffcanvasLabel">
        <div class="offcanvas-header border-bottom bg-light">
            <h5 class="offcanvas-title fw-bold" id="menuOffcanvasLabel" style="color: #002b5e;">Menu Navigasi</h5>
            <button type="button" class="btn-close shadow-none" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column p-4">
            <ul class="navbar-nav flex-grow-1 pe-3">
                <li class="nav-item mb-3">
                    <a class="nav-link text-dark fw-bold fs-5 d-flex align-items-center" href="index.html">
                        <i class="bi bi-house-door-fill me-3 fs-4" style="color: #0099ff;"></i> Beranda
                    </a>
                </li>
                <li class="nav-item mb-3">
                    <a class="nav-link text-dark fw-bold fs-5 d-flex align-items-center" href="https://kia.acehprov.go.id" target="_blank">
                        <i class="bi bi-globe me-3 fs-4 text-info"></i> Ke Website Utama
                    </a>
                </li>
            </ul>
            
            <div class="mt-auto pt-4 border-top">
                <p class="text-muted fw-bold mb-3">Ikuti Sosial Media Kami:</p>
                <div class="d-flex gap-4">
                    <a href="https://instagram.com" target="_blank" class="text-decoration-none transition-hover" style="color: #E1306C;" title="Instagram"><i class="bi bi-instagram fs-2"></i></a>
                    <a href="https://facebook.com" target="_blank" class="text-decoration-none transition-hover" style="color: #1877F2;" title="Facebook"><i class="bi bi-facebook fs-2"></i></a>
                    <a href="https://youtube.com" target="_blank" class="text-decoration-none transition-hover" style="color: #FF0000;" title="YouTube"><i class="bi bi-youtube fs-2"></i></a>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="container mt-4 mt-md-5 flex-grow-1 mb-5 pb-4">
        <div class="text-center mb-4 px-2">
            <h2 class="fw-bold fs-4 fs-md-3">Sistem Informasi Sengketa Komisi Informasi Aceh</h2>
            
            <div class="row justify-content-center mt-4">
                <div class="col-12 col-md-8 col-lg-6">
                    <div class="input-group search-box-elegant shadow bg-white p-1">
                        <input type="text" id="searchInput" class="form-control px-3" placeholder="Cari Pemohon / Termohon..." oninput="filterTable()">
                        <button class="btn btn-primary rounded-pill px-3 px-md-4 fw-bold me-1" onclick="filterTable()">Cari</button>
                        <button class="btn btn-light border rounded-pill px-3 fw-bold text-secondary" onclick="clearSearch()">Hapus</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="publicDataContainer" class="px-2 px-md-0">
            <div class="text-center py-5" id="loadingStatus">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2 text-muted fw-bold">Memuat data...</p>
            </div>
        </div>
    </main>

    <!-- Tombol Scroll to Top (Menggunakan style display default none) -->
    <button id="btnScrollTop" class="btn shadow-lg rounded-circle position-fixed" 
            style="bottom: 80px; right: 20px; width: 50px; height: 50px; z-index: 1040; border: 2px solid white; background: linear-gradient(135deg, #0099ff 0%, #002b5e 100%); display: none; align-items: center; justify-content: center; padding: 0;" 
            onclick="scrollToTop()" title="Kembali ke Atas">
        <i class="bi bi-chevron-up fs-4 text-white"></i>
    </button>

    <!-- Modal Detail Perkara -->
    <div class="modal fade" id="detailModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-info position-relative">
                    <h5 class="modal-title fw-bold fs-6 fs-md-5 w-100 text-center text-dark" id="detailModalTitle">Detail Perkara</h5>
                    <button type="button" class="btn-close position-absolute end-0 me-3 shadow-none" onclick="closeDetailModal()"></button>
                </div>
                <div class="modal-body position-relative bg-light px-3 px-md-4">
                    <div id="detailLoading" style="display: none;" class="text-center py-5"><div class="spinner-border text-info" role="status"></div></div>
                    <div class="row" id="detailContent"></div>
                </div>
                <div class="modal-footer position-relative d-flex justify-content-center align-items-center bg-light py-2" style="min-height: 55px; border-top: 1px solid #dee2e6;">
                    <button type="button" class="btn btn-secondary btn-sm px-4 fw-bold shadow-sm" onclick="closeDetailModal()">Tutup</button>
                    <div class="position-absolute end-0 bottom-0 me-2 me-md-3 mb-2 text-muted fw-normal" style="font-size: 0.70rem;" id="modalLastUpdated">
                        Diperbarui: -
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-freeze">&copy; 2026 Komisi Informasi Aceh (KIACEH).</footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let sheetHeadersPerkara = [], perkaraData = [], detailHeaders = [], detailData = [], updateData = [];

        async function loadPublicData() {
            const container = document.getElementById('publicDataContainer');
            if (!container) return;

            try {
                container.innerHTML = '<div class="text-center py-5" id="loadingStatus"><div class="spinner-border text-primary" role="status"></div><p class="mt-2 text-muted fw-bold">Memuat data...</p></div>';

                const response = await fetch('/api/data');
                if (!response.ok) throw new Error(`Gagal terhubung ke server (HTTP Status: ${response.status})`);

                const textData = await response.text();
                let data;
                try { data = JSON.parse(textData); } 
                catch (e) { throw new Error("Format respons dari server tidak valid."); }

                if (!data || !data.perkara || data.perkara.length <= 1) { 
                    container.innerHTML = '<div class="text-center py-5 bg-white rounded-3 shadow-sm"><p class="text-muted fw-bold mb-0">Belum ada data sengketa yang tersedia.</p></div>'; 
                    return; 
                }

                sheetHeadersPerkara = data.perkara[0] || []; 
                perkaraData = data.perkara.slice(1) || []; 
                detailHeaders = (data.detail && data.detail[0]) ? data.detail[0] : []; 
                detailData = (data.detail && data.detail.length > 1) ? data.detail.slice(1) : [];
                updateData = (data.update && data.update.length > 1) ? data.update.slice(1) : [];
                
                const skipIdx = sheetHeadersPerkara.findIndex(h => (`${h}`).toLowerCase().trim() === 'detail');
                
                // PERBAIKAN: Struktur pembungkus dipisah. .table-elegant-wrapper di luar, .table-responsive di dalam.
                let tableHtml = `<div class="bg-white shadow-sm table-elegant-wrapper">
                                    <div class="table-responsive">
                                        <table class="table table-sm table-hover table-striped mb-0 align-middle">
                                            <thead class="table-dark text-nowrap"><tr>`;
                
                sheetHeadersPerkara.forEach((h, i) => { if(i !== skipIdx) tableHtml += `<th class="py-2 px-3">${h || '-'}</th>`; });
                tableHtml += `<th class="py-2 px-3 text-center">Detail</th></tr></thead><tbody id="dataTable">`;

                perkaraData.forEach(row => {
                    if (!row || row.length === 0) return; 
                    tableHtml += `<tr>`;
                    for (let i = 0; i < sheetHeadersPerkara.length; i++) { 
                        if(i !== skipIdx) tableHtml += `<td class="px-3 py-2 text-nowrap">${row[i] || '-'}</td>`; 
                    }
                    tableHtml += `<td class="px-3 py-2 text-center"><button class="btn btn-warning btn-sm text-dark fw-bold shadow-sm py-1 px-3 rounded-pill" onclick="lihatDetail('${row[0] || ''}')">Lihat</button></td></tr>`;
                });
                
                tableHtml += `</tbody></table></div></div>`;
                container.innerHTML = tableHtml;

            } catch (error) { 
                console.error("Load Data Error:", error);
                container.innerHTML = `
                    <div class="text-center py-5 my-4 border border-danger rounded-3 bg-white shadow-sm">
                        <h5 class="text-danger fw-bold"><i class="bi bi-exclamation-triangle-fill"></i> Gagal Memuat Data</h5>
                        <p class="text-muted mb-3">${error.message}</p>
                        <button class="btn btn-outline-danger btn-sm px-4 fw-bold rounded-pill" onclick="loadPublicData()">Coba Muat Ulang</button>
                    </div>`; 
            }
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#dataTable tr');
            const idxPem = sheetHeadersPerkara.findIndex(h => (`${h}`).toLowerCase().includes('pemohon'));
            const idxTerm = sheetHeadersPerkara.findIndex(h => (`${h}`).toLowerCase().includes('termohon'));
            const skipIdx = sheetHeadersPerkara.findIndex(h => (`${h}`).toLowerCase().trim() === 'detail');
            
            rows.forEach(row => {
                const cells = row.getElementsByTagName('td');
                if(cells.length <= 1) return;
                const pemohon = cells[idxPem > skipIdx ? idxPem - 1 : idxPem] ? cells[idxPem > skipIdx ? idxPem - 1 : idxPem].textContent.toLowerCase() : '';
                const termohon = cells[idxTerm > skipIdx ? idxTerm - 1 : idxTerm] ? cells[idxTerm > skipIdx ? idxTerm - 1 : idxTerm].textContent.toLowerCase() : '';
                row.style.display = (pemohon.includes(query) || termohon.includes(query)) ? '' : 'none';
            });
        }
        function clearSearch() { document.getElementById('searchInput').value = ''; filterTable(); }

        function lihatDetail(id) {
            new bootstrap.Modal(document.getElementById('detailModal')).show();
            document.getElementById('detailLoading').style.display = 'block'; document.getElementById('detailContent').innerHTML = '';

            const pRow = perkaraData.find(r => r[0] === id);
            const getIndexPem = sheetHeadersPerkara.findIndex(h=>(`${h}`).toLowerCase().includes('pemohon'));
            const getIndexTerm = sheetHeadersPerkara.findIndex(h=>(`${h}`).toLowerCase().includes('termohon'));
            document.getElementById('detailModalTitle').innerText = pRow ? `${pRow[getIndexPem] || 'Pemohon'} vs ${pRow[getIndexTerm] || 'Termohon'}` : 'Detail Perkara';

            setTimeout(() => {
                const row = detailData.find(r => r[0] === id);
                const leftFields = ["no reg", "tgl register", "ketua majelis", "anggota 1", "anggota 2", "mediator", "panitera pengganti", "status sengketa", "sidang terakhir", "tgl sidang selanjutnya", "agenda sidang selanjutnya", "nomor putusan", "tgl diputuskan", "link putusan"];
                
                let leftHtml = '<div class="col-md-6">';

                leftFields.forEach(f => {
                    let fieldVal = '-', labelText = '';
                    const findIdx = (headers) => headers.findIndex(h => { const val = (`${h}`).toLowerCase().trim(); return val === f || (f === 'no reg' && val === 'rincian informasi') || (f === 'sidang terakhir' && val === 'sidang'); });

                    let idx = findIdx(detailHeaders);
                    if(idx !== -1) { fieldVal = row ? (row[idx] || '-') : '-'; labelText = detailHeaders[idx]; } 
                    else { idx = findIdx(sheetHeadersPerkara); if(idx !== -1) { fieldVal = pRow ? (pRow[idx] || '-') : '-'; labelText = sheetHeadersPerkara[idx]; } }

                    if(idx !== -1) {
                        if(f === 'no reg') labelText = 'No Reg'; if(f === 'sidang terakhir') labelText = 'Sidang Terakhir';
                        
                        if(f.includes('tgl') || f.includes('tanggal') || f.includes('sidang')) {
                            if (/^\d{4}-\d{2}-\d{2}$/.test(fieldVal)) { const p = fieldVal.split('-'); fieldVal = `${p[2]}/${p[1]}/${p[0]}`; }
                        }
                        if (f === 'link putusan' && fieldVal !== '-' && fieldVal !== '') fieldVal = `<a href="${!fieldVal.startsWith('http')?'https://'+fieldVal:fieldVal}" target="_blank" class="text-primary fw-bold text-decoration-none">Buka Putusan <i class="bi bi-box-arrow-up-right"></i></a>`;
                        
                        leftHtml += `<div class="card shadow-sm border-0 mb-3 rounded-3"><div class="card-body py-2 px-3"><div class="text-muted fw-bold d-block" style="font-size: 0.75rem;">${labelText}</div><div class="text-dark" style="font-size: 0.9rem;">${fieldVal}</div></div></div>`;
                    }
                });
                leftHtml += '</div>';

                const pRowIndex = perkaraData.findIndex(r => r[0] === id);
                let latestUpdatedDate = '-';
                if (pRowIndex !== -1 && updateData[pRowIndex] && updateData[pRowIndex][0]) {
                    latestUpdatedDate = updateData[pRowIndex][0];
                }
                if (document.getElementById('modalLastUpdated')) {
                    document.getElementById('modalLastUpdated').innerText = "Terakhir Diperbarui: " + latestUpdatedDate;
                }

                const idxPermohonan = detailHeaders.findIndex(h => (`${h}`).toLowerCase().trim() === 'isi permohonan');
                let rightHtml = `<div class="col-md-6"><div class="card shadow-sm border-0 rounded-3 mb-3"><div class="card-header bg-white border-bottom fw-bold" style="font-size: 0.9rem; color: #002b5e;">Isi Permohonan</div><div class="card-body scrollable-box" style="font-size: 0.9rem; max-height: 400px; overflow-y: auto;"><div class="text-dark">${idxPermohonan !== -1 ? (row ? row[idxPermohonan] || '-' : '-') : '-'}</div></div></div></div>`;
                
                document.getElementById('detailContent').innerHTML = leftHtml + rightHtml; document.getElementById('detailLoading').style.display = 'none';
            }, 500); 
        }

        function closeDetailModal() { bootstrap.Modal.getInstance(document.getElementById('detailModal')).hide(); }

        document.addEventListener('DOMContentLoaded', loadPublicData);

        // PERBAIKAN: Fungsi Scroll To Top Universal
        const btnScrollTop = document.getElementById('btnScrollTop');
        window.addEventListener('scroll', () => {
            // Menggunakan documentElement.scrollTop agar kompatibel di semua browser HP
            if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
                btnScrollTop.style.display = "flex";
            } else {
                btnScrollTop.style.display = "none";
            }
        });
        
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
