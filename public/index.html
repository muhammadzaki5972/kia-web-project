<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Publik - KIACEH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <nav class="navbar navbar-dark bg-primary shadow-sm py-3 sticky-top">
        <div class="container d-flex flex-wrap justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center text-decoration-none m-0" href="#">
                <img src="https://www.freepnglogos.com/uploads/logo-garuda-png/garuda-buku-pembangunan-desa-kementrian-desa-pdtt-2.png" alt="Logo Garuda" class="brand-logo">
                <div class="d-flex flex-column lh-1">
                    <span class="fs-4 fw-bold">KIACEH</span>
                    <span class="fs-6 fw-normal text-white-50">Komisi Informasi Aceh</span>
                </div>
            </a>
            <a href="login.html" class="btn btn-outline-light btn-sm">Login Admin</a>
        </div>
    </nav>

    <main class="container mt-5 flex-grow-1 mb-5">
        <div class="text-center mb-4 px-3">
            <h2 class="fw-bold fs-3">Informasi Data Perkara Publik</h2>
            <p class="text-muted fs-6">Data diperbarui secara real-time.</p>
        </div>
        <div id="publicDataContainer">
            <div class="text-center py-5" id="loadingStatus">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Memuat data...</p>
            </div>
        </div>
    </main>

    <!-- Modal Pop Up -->
    <div class="modal fade" id="detailModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-info text-white d-flex justify-content-start align-items-center">
                    <button type="button" class="btn-close btn-close-white me-3 m-0" onclick="closeDetailModal()"></button>
                    <h5 class="modal-title fw-bold m-0 fs-5" id="detailModalTitle">Detail Perkara</h5>
                </div>
                <div class="modal-body position-relative bg-light">
                    <div id="detailLoading" style="display: none;">
                        <div class="spinner-border text-info" role="status"></div>
                    </div>
                    <div class="row" id="detailContent"></div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container"><small>&copy; 2026 Komisi Informasi Aceh (KIACEH). Semua hak dilindungi.</small></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let sheetHeadersPerkara = [], perkaraData = [], detailHeaders = [], detailData = [];

        async function loadPublicData() {
            const container = document.getElementById('publicDataContainer');
            try {
                const response = await fetch('/api/data');
                const data = await response.json();
                
                if (!data.perkara || data.perkara.length <= 1) {
                    container.innerHTML = '<div class="text-center"><p class="text-muted">Data kosong.</p></div>'; return;
                }

                sheetHeadersPerkara = data.perkara[0]; 
                perkaraData = data.perkara.slice(1); 
                detailHeaders = data.detail[0] || [];
                detailData = data.detail.slice(1) || [];
                
                const skipIdx = sheetHeadersPerkara.findIndex(h => h.toLowerCase().trim() === 'detail');

                let tableHtml = `<div class="table-responsive shadow-sm bg-white border"><table class="table table-sm table-bordered table-hover table-striped mb-0"><thead class="table-dark"><tr>`;
                sheetHeadersPerkara.forEach((h, i) => { if(i !== skipIdx) tableHtml += `<th>${h}</th>`; });
                tableHtml += `<th>Detail</th></tr></thead><tbody>`;

                perkaraData.forEach(row => {
                    tableHtml += `<tr>`;
                    for (let i = 0; i < sheetHeadersPerkara.length; i++) {
                        if(i !== skipIdx) tableHtml += `<td>${row[i] || '-'}</td>`;
                    }
                    tableHtml += `<td><button class="btn btn-info btn-sm text-white fw-bold shadow-sm py-0" onclick="lihatDetail('${row[0]}')">Lihat</button></td></tr>`;
                });
                tableHtml += `</tbody></table></div>`;
                container.innerHTML = tableHtml;
            } catch (error) { container.innerHTML = `<div class="text-center text-danger">Error: ${error.message}</div>`; }
        }

        function lihatDetail(id) {
            new bootstrap.Modal(document.getElementById('detailModal')).show();
            document.getElementById('detailLoading').style.display = 'flex';
            document.getElementById('detailContent').innerHTML = '';

            const pRow = perkaraData.find(r => r[0] === id);
            const idxPem = sheetHeadersPerkara.findIndex(h => h.toLowerCase().includes('pemohon'));
            const idxTerm = sheetHeadersPerkara.findIndex(h => h.toLowerCase().includes('termohon'));
            document.getElementById('detailModalTitle').innerText = pRow ? `${pRow[idxPem] || 'Pemohon'} vs ${pRow[idxTerm] || 'Termohon'}` : 'Detail';

            setTimeout(() => {
                const row = detailData.find(r => r[0] === id);
                const leftFields = ["rincian informasi", "ketua majelis", "anggota 1", "anggota 2", "mediator", "panitera pengganti", "status sengketa", "sidang", "link putusan"];
                let leftHtml = '<div class="col-md-6">';
                leftFields.forEach(f => {
                    const idx = detailHeaders.findIndex(h => h.toLowerCase().trim() === f);
                    if(idx !== -1) leftHtml += `<div class="card shadow-sm border-0 mb-3"><div class="card-body py-2"><small class="text-muted fw-bold d-block mb-1">${detailHeaders[idx]}</small><div class="text-dark">${row ? (row[idx] || '-') : '-'}</div></div></div>`;
                });
                leftHtml += '</div>';

                const idxPermohonan = detailHeaders.findIndex(h => h.toLowerCase().trim() === 'isi permohonan');
                let rightHtml = `<div class="col-md-6"><div class="card shadow-sm border-0"><div class="card-header bg-light fw-bold">Isi Permohonan</div><div class="card-body scrollable-box"><div class="text-dark">${row && idxPermohonan !== -1 ? (row[idxPermohonan] || '-') : '-'}</div></div></div></div>`;
                
                document.getElementById('detailContent').innerHTML = leftHtml + rightHtml;
                document.getElementById('detailLoading').style.display = 'none';
            }, 500); 
        }

        function closeDetailModal() { bootstrap.Modal.getInstance(document.getElementById('detailModal')).hide(); }
        window.onload = loadPublicData;
    </script>
</body>
</html>
