<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Publik - KIACEH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <nav class="navbar navbar-dark bg-primary shadow-sm py-3 sticky-top">
        <div class="container d-flex flex-wrap justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center text-decoration-none m-0" href="#">
                <img src="https://www.freepnglogos.com/uploads/logo-garuda-png/garuda-buku-pembangunan-desa-kementrian-desa-pdtt-2.png" alt="Logo Garuda" class="brand-logo">
                <div class="d-flex flex-column lh-1">
                    <span class="fs-4 fw-bold">KIACEH</span>
                    <span class="fs-6 fw-normal text-white-50">Komisi Informasi Aceh</span>
                </div>
            </a>
            <a href="login.html" class="btn btn-outline-light btn-sm">Login Admin</a>
        </div>
    </nav>

    <main class="container mt-5 flex-grow-1 mb-5">
        <div class="text-center mb-4 px-3">
            <h2 class="fw-bold fs-3">Informasi Data Perkara Publik</h2>
            <div class="row justify-content-center mt-3">
                <div class="col-md-8 col-lg-6">
                    <div class="input-group shadow-sm">
                        <input type="text" id="searchInput" class="form-control" placeholder="Cari Pemohon / Termohon..." oninput="filterTable()">
                        <button class="btn btn-primary" onclick="filterTable()">Cari</button>
                        <button class="btn btn-secondary" onclick="clearSearch()">Hapus</button>
                    </div>
                </div>
            </div>
        </div>
        <div id="publicDataContainer">
            <div class="text-center py-5" id="loadingStatus"><div class="spinner-border text-primary" role="status"></div><p class="mt-2">Memuat data...</p></div>
        </div>
    </main>

    <div class="modal fade" id="detailModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 shadow">
                <div class="modal-header bg-info position-relative">
                    <h5 class="modal-title fw-bold fs-5 w-100 text-center text-dark" id="detailModalTitle">Detail Perkara</h5>
                    <button type="button" class="btn-close position-absolute end-0 me-3" onclick="closeDetailModal()"></button>
                </div>
                <div class="modal-body position-relative bg-light">
                    <div id="detailLoading" style="display: none;"><div class="spinner-border text-info" role="status"></div></div>
                    <div class="row" id="detailContent"></div>
                </div>
                <div class="modal-footer position-relative d-flex justify-content-center align-items-center bg-light py-2" style="min-height: 55px; border-top: 1px solid #dee2e6;">
                    <button type="button" class="btn btn-secondary btn-sm px-4 fw-bold shadow-sm" onclick="closeDetailModal()">Tutup</button>
                    <div class="position-absolute end-0 bottom-0 me-3 mb-2 text-muted fw-normal" style="font-size: 0.75rem;" id="modalLastUpdated">
                        Data terakhir diperbarui tanggal: -
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer-freeze">&copy; 2026 Komisi Informasi Aceh (KIACEH).</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let sheetHeadersPerkara = [], perkaraData = [], detailHeaders = [], detailData = [];

        async function loadPublicData() {
            const container = document.getElementById('publicDataContainer');
            try {
                const response = await fetch('/api/data'); const data = await response.json();
                if (!data.perkara || data.perkara.length <= 1) { container.innerHTML = '<div class="text-center"><p class="text-muted">Data kosong.</p></div>'; return; }

                sheetHeadersPerkara = data.perkara; perkaraData = data.perkara.slice(1); 
                detailHeaders = data.detail || []; detailData = data.detail.slice(1) || [];
                
                const skipIdx = sheetHeadersPerkara.findIndex(h => h && h.toString().toLowerCase().trim() === 'detail');
                let tableHtml = `<div class="table-responsive shadow-sm bg-white border"><table class="table table-sm table-bordered table-hover table-striped mb-0"><thead class="table-dark"><tr>`;
                sheetHeadersPerkara.forEach((h, i) => { 
                    const lowH = h ? h.toString().toLowerCase().trim() : '';
                    if(i !== skipIdx && lowH !== 'tanggal update' && lowH !== 'terakhir diperbarui') {
                        tableHtml += `<th>${h}</th>`; 
                    }
                });
                tableHtml += `<th>Detail</th></tr></thead><tbody id="dataTable">`;

                perkaraData.forEach(row => {
                    tableHtml += `<tr>`;
                    for (let i = 0; i < sheetHeadersPerkara.length; i++) { 
                        const lowH = sheetHeadersPerkara[i] ? sheetHeadersPerkara[i].toString().toLowerCase().trim() : '';
                        if(i !== skipIdx && lowH !== 'tanggal update' && lowH !== 'terakhir diperbarui') {
                            tableHtml += `<td>${row[i] || '-'}</td>`; 
                        }
                    }
                    tableHtml += `<td><button class="btn btn-warning btn-sm text-dark fw-bold shadow-sm py-0" onclick="lihatDetail('${row}')">Lihat</button></td></tr>`;
                });
                tableHtml += `</tbody></table></div>`;
                container.innerHTML = tableHtml;
            } catch (error) { container.innerHTML = `<div class="text-center text-danger">Error: ${error.message}</div>`; }
        }

        function filterTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('#dataTable tr');
            const idxPem = sheetHeadersPerkara.findIndex(h => h && h.toString().toLowerCase().includes('pemohon'));
            const idxTerm = sheetHeadersPerkara.findIndex(h => h && h.toString().toLowerCase().includes('termohon'));
            const skipIdx = sheetHeadersPerkara.findIndex(h => h && h.toString().toLowerCase().trim() === 'detail');
            
            rows.forEach(row => {
                const cells = row.getElementsByTagName('td');
                if(cells.length <= 1) return;
                const pemohon = cells[idxPem > skipIdx ? idxPem - 1 : idxPem] ? cells[idxPem > skipIdx ? idxPem - 1 : idxPem].textContent.toLowerCase() : '';
                const termohon = cells[idxTerm > skipIdx ? idxTerm - 1 : idxTerm] ? cells[idxTerm > skipIdx ? idxTerm - 1 : idxTerm].textContent.toLowerCase() : '';
                row.style.display = (pemohon.includes(query) || termohon.includes(query)) ? '' : 'none';
            });
        }
        function clearSearch() { document.getElementById('searchInput').value = ''; filterTable(); }

        function lihatDetail(id) {
            new bootstrap.Modal(document.getElementById('detailModal')).show();
            document.getElementById('detailLoading').style.display = 'flex'; document.getElementById('detailContent').innerHTML = '';

            const pRow = perkaraData.find(r => r === id);
            const pemStr = sheetHeadersPerkara.findIndex(h => h && h.toString().toLowerCase().includes('pemohon'));
            const termStr = sheetHeadersPerkara.findIndex(h => h && h.toString().toLowerCase().includes('termohon'));
            document.getElementById('detailModalTitle').innerText = pRow ? `${pRow[pemStr] || 'Pemohon'} vs ${pRow[termStr] || 'Termohon'}` : 'Detail';

            setTimeout(() => {
                const row = detailData.find(r => r === id);
                const leftFields = ["no reg", "tgl register", "ketua majelis", "anggota 1", "anggota 2", "mediator", "panitera pengganti", "status sengketa", "sidang terakhir", "tgl sidang selanjutnya", "agenda sidang selanjutnya", "nomor putusan", "tgl diputuskan", "link putusan"];
                
                let leftHtml = '<div class="col-md-6">';
                let datesCollected = [];

                leftFields.forEach(f => {
                    let fieldVal = '-', labelText = '';
                    const findIdx = (headers) => headers.findIndex(h => { const val = h ? h.toString().toLowerCase().trim() : ''; return val === f || (f === 'no reg' && val === 'rincian informasi') || (f === 'sidang terakhir' && val === 'sidang'); });

                    let idx = findIdx(detailHeaders);
                    if(idx !== -1) { fieldVal = row ? (row[idx] || '-') : '-'; labelText = detailHeaders[idx]; } 
                    else { idx = findIdx(sheetHeadersPerkara); if(idx !== -1) { fieldVal = pRow ? (pRow[idx] || '-') : '-'; labelText = sheetHeadersPerkara[idx]; } }

                    if(idx !== -1) {
                        if(f === 'no reg') labelText = 'No Reg'; if(f === 'sidang terakhir') labelText = 'Sidang Terakhir';
                        
                        if(fieldVal !== '-' && fieldVal !== '') {
                            if (/^\d{4}-\d{2}-\d{2}$/.test(fieldVal)) { datesCollected.push(new Date(fieldVal)); } 
                            else if (/^\d{2}[\/\-]\d{2}[\/\-]\d{4}$/.test(fieldVal)) { const p = fieldVal.split(/[\/\-]/); datesCollected.push(new Date(`${p}-${p}-${p}`)); }
                        }

                        if(f.includes('tgl') || f.includes('tanggal') || f.includes('sidang')) {
                            if (/^\d{4}-\d{2
