<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Publik - KIACEH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <!-- Navbar Responsif dengan Freeze (sticky-top) -->
    <nav class="navbar navbar-dark bg-primary shadow-sm py-3 sticky-top">
        <div class="container d-flex flex-wrap justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center text-decoration-none m-0" href="#">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/National_emblem_of_Indonesia_Garuda_Pancasila.svg/600px-National_emblem_of_Indonesia_Garuda_Pancasila.svg.png" alt="Logo Garuda" class="brand-logo">
                <div class="d-flex flex-column lh-1">
                    <span class="fs-4 fw-bold">KIACEH</span>
                    <span class="fs-6 fw-normal text-white-50">Komisi Informasi Aceh</span>
                </div>
            </a>
            <a href="login.html" class="btn btn-outline-light btn-sm">Login Admin</a>
        </div>
    </nav>

    <!-- Konten Utama (flex-grow-1 mendorong footer ke bawah) -->
    <main class="container mt-5 flex-grow-1 mb-5">
        <div class="text-center mb-4 px-3">
            <h2 class="fw-bold">Informasi Data Perkara Publik</h2>
            <p class="text-muted">Data di bawah ini diperbarui secara real-time dari sistem administrasi.</p>
        </div>

        <div id="publicDataContainer">
            <div class="text-center py-5" id="loadingStatus">
                <div class="spinner-border text-primary" role="status"></div>
                <p class="mt-2">Memuat data dari server...</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container">
            <small>&copy; 2026 Komisi Informasi Aceh (KIACEH). Semua hak dilindungi.</small>
        </div>
    </footer>

    <script>
        async function loadPublicData() {
            const container = document.getElementById('publicDataContainer');
            
            try {
                const response = await fetch('/api/data');
                const data = await response.json();

                if (!response.ok || data.error) throw new Error(data.error || 'Gagal memuat API');
                
                if (!data || data.length <= 1) {
                    container.innerHTML = '<div class="text-center"><p class="text-muted">Belum ada data perkara yang dipublikasikan.</p></div>';
                    return;
                }

                const headers = data[0]; 
                const rows = data.slice(1); 
                
                // Membuat struktur tabel small, hovered, dan responsif
                let tableHtml = `
                    <div class="table-responsive shadow-sm bg-white border">
                        <table class="table table-sm table-hover table-striped mb-0">
                            <thead class="table-dark">
                                <tr>
                `;

                // Render Header
                headers.forEach(header => {
                    tableHtml += `<th>${header}</th>`;
                });

                tableHtml += `
                                </tr>
                            </thead>
                            <tbody>
                `;

                // Render Baris Data
                rows.forEach(row => {
                    tableHtml += `<tr>`;
                    for (let i = 0; i < headers.length; i++) {
                        tableHtml += `<td>${row[i] || '-'}</td>`;
                    }
                    tableHtml += `</tr>`;
                });

                tableHtml += `
                            </tbody>
                        </table>
                    </div>
                `;

                container.innerHTML = tableHtml;

            } catch (error) {
                container.innerHTML = `<div class="text-center text-danger fw-bold">Kesalahan: ${error.message}</div>`;
            }
        }

        window.onload = loadPublicData;
    </script>
</body>
</html>
