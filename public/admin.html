<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dasbor Admin - KIA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">Panel Admin - Data Perkara</a>
            <div class="d-flex gap-2">
                <a href="index.html" class="btn btn-outline-light btn-sm">Lihat Web Publik</a>
                <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Manajemen Data Perkara</h2>
            <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#tambahDataModal">
                + Tambah Data
            </button>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0" style="overflow-x: auto;">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr id="tableHeader">
                            <!-- Header digenerate otomatis dari JS -->
                        </tr>
                    </thead>
                    <tbody id="dataTable">
                        <tr><td colspan="7" class="text-center py-4">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Tambah Data -->
    <div class="modal fade" id="tambahDataModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Input Data Baru</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formTambahData">
                        <!-- Input form akan dibuat otomatis oleh main.js berdasarkan header Spreadsheet -->
                        <div id="dynamicFormContainer"></div>
                        
                        <button type="submit" class="btn btn-primary w-100 mt-3" id="btnSubmit">Simpan ke Spreadsheet</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
