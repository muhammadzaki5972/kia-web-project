<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dasbor Admin - KIACEH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Quill Text Editor CSS -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <nav class="navbar navbar-dark bg-dark py-3 sticky-top">
        <div class="container d-flex flex-wrap justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center text-decoration-none m-0" href="#">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/National_emblem_of_Indonesia_Garuda_Pancasila.svg/600px-National_emblem_of_Indonesia_Garuda_Pancasila.svg.png" alt="Logo Garuda" class="brand-logo">
                <div class="d-flex flex-column lh-1">
                    <span class="fs-4 fw-bold">KIACEH</span>
                    <span class="fs-6 fw-normal text-white-50">Panel Admin Data Perkara</span>
                </div>
            </a>
            <div class="d-flex gap-2 mt-2 mt-sm-0 w-sm-100">
                <a href="index.html" class="btn btn-outline-light btn-sm flex-grow-1">Web Publik</a>
                <button class="btn btn-danger btn-sm flex-grow-1" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container mt-4 mt-md-5 flex-grow-1 mb-5">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
            <h3 class="fw-bold m-0 fs-4">Manajemen Data Utama & Detail</h3>
            <button class="btn btn-success" onclick="bukaModalTambah()">
                + Tambah Data Lengkap
            </button>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-sm table-bordered table-hover table-striped mb-0">
                        <thead class="table-dark"><tr id="tableHeader"></tr></thead>
                        <tbody id="dataTable">
                            <tr><td colspan="8" class="text-center py-4">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Form (Bisa untuk Tambah atau Edit) -->
    <div class="modal fade" id="tambahDataModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
            <div class="modal-content border-0">
                <div class="modal-header bg-success text-white" id="modalFormHeader">
                    <h5 class="modal-title fw-bold" id="modalFormTitle">Input Data Perkara Baru</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-light">
                    <form id="formTambahData">
                        <div id="dynamicFormContainer"></div>
                        <button type="submit" class="btn btn-success w-100 mt-4 py-2 fw-bold" id="btnSubmit">Simpan ke Google Sheets</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container"><small>&copy; 2026 Komisi Informasi Aceh (KIACEH). Area Administratif.</small></div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
