<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KIACEH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center px-3" style="min-height: 100vh;">
    <div class="card shadow border-0" style="width: 100%; max-width: 400px;">
        <div class="card-body p-4 p-md-5">
            <!-- Header Login dengan Identitas KIACEH -->
            <div class="text-center mb-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2f/National_emblem_of_Indonesia_Garuda_Pancasila.svg/600px-National_emblem_of_Indonesia_Garuda_Pancasila.svg.png" alt="Logo Garuda" style="width: 65px;" class="mb-3">
                <h3 class="fw-bold mb-0">KIACEH</h3>
                <p class="text-muted small">Komisi Informasi Aceh</p>
            </div>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label text-muted fw-medium">Username</label>
                    <input type="text" id="username" class="form-control form-control-lg fs-6" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted fw-medium">Password</label>
                    <input type="password" id="password" class="form-control form-control-lg fs-6" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Masuk Sistem</button>
            </form>
            <div class="text-center mt-4">
                <a href="index.html" class="text-decoration-none small text-muted">← Kembali ke Publik</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if(user === 'admin' && pass === 'admin123') {
                sessionStorage.setItem('isLoggedIn', 'true');
                window.location.href = 'admin.html';
            } else {
                alert('Username atau Password salah!');
            }
        });
    </script>
</body>
</html>
